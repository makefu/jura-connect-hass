force_update:
  name: Force Update
  description: Force an immediate poll of the machine.
  fields:
    config_entry_id:
      name: Config Entry ID
      description: The config entry ID of the machine (alternative to entity_id).
      selector:
        text:
    entity_id:
      name: Entity
      description: Any Jura sensor entity (alternative to config_entry_id).
      selector:
        entity:
          integration: jura

lock_screen:
  name: Lock Screen
  description: Lock the machine's front-panel display.
  fields:
    config_entry_id:
      name: Config Entry ID
      selector:
        text:
    entity_id:
      name: Entity
      selector:
        entity:
          integration: jura

unlock_screen:
  name: Unlock Screen
  description: Unlock the machine's front-panel display.
  fields:
    config_entry_id:
      name: Config Entry ID
      selector:
        text:
    entity_id:
      name: Entity
      selector:
        entity:
          integration: jura

brew:
  name: Brew
  description: >-
    Brew a drink. Pick a product by name (optionally overriding
    strength/water/temperature), or pass a raw recipe payload. This
    PHYSICALLY brews a drink on the machine.
  fields:
    config_entry_id:
      name: Config Entry ID
      selector:
        text:
    entity_id:
      name: Entity
      selector:
        entity:
          integration: jura
    product:
      name: Product
      description: >-
        Product name from the machine's product table (e.g. "Espresso").
        See the "Brew Product" select for the valid names on your model.
        Mutually exclusive with recipe.
      example: Espresso
      selector:
        text:
    strength:
      name: Coffee strength
      description: >-
        Optional strength level (model-specific, e.g. 1-10). Omit for the
        product's factory default. Clamped to the product's valid range.
      selector:
        number:
          min: 1
          max: 16
          mode: box
    water_ml:
      name: Water
      description: >-
        Optional water amount in millilitres. Omit for the product's factory
        default. Clamped to the product's valid range.
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: mL
          mode: box
    temperature:
      name: Temperature
      description: >-
        Optional temperature level (model-specific, e.g. 1 = Normal, 2 = High).
        Omit for the product's factory default. Clamped to the product's valid set.
      selector:
        number:
          min: 1
          max: 3
          mode: box
    recipe:
      name: Recipe (advanced)
      description: >-
        Raw 16-byte hex payload without the @TP: prefix (legacy/advanced).
        Mutually exclusive with product.
      example: "02000809000002000100000000000000"
      selector:
        text:

