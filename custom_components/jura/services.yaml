  name: Power Off
  description: Put the machine into standby. Re-enabling requires manual wake-up.
  fields:
    config_entry_id:
      name: Config Entry ID
      selector:
        text:
    entity_id:
      name: Entity
      selector:
        entity:
          integration: jura

